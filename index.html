<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miu Diary</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div class="logo">Miu Diary</div>
    <div id="tag-filters">
      <input id="tag-search" type="text" placeholder="search tags…" oninput="filterBySearch(this.value)" autocomplete="off">
      <button class="pill on" id="active-tag-pill">all</button>
      <button id="tag-panel-btn" onclick="toggleTagPanel()" title="browse tags">#</button>
    </div>
  </header>

  <!-- tag panel -->
  <div id="tag-panel-overlay" onclick="closeTagPanel()"></div>
  <div id="tag-panel">
    <div id="tag-panel-header">
      <span>tags</span>
      <button onclick="closeTagPanel()">✕</button>
    </div>
    <div id="tag-panel-body"></div>
  </div>

  <div id="layout">
    <nav id="sidebar">
      <div id="month-nav"></div>
    </nav>
    <div id="main">
      <div id="content"></div>
      <div id="pager"></div>
    </div>
  </div>

  <div id="lb">
    <button id="lb-close" onclick="closeLb()">✕</button>
    <button class="arr" id="lb-prev" onclick="nav(1)">‹</button>
    <button class="arr" id="lb-next" onclick="nav(-1)">›</button>
    <div id="lb-inner">
      <img id="lb-img" src="" alt="">
      <div id="lb-info">
        <div id="lb-date"></div>
        <div id="lb-file"></div>
        <div class="lb-label">tags</div>
        <div id="lb-tags"></div>
        <div id="lb-notes-wrap">
          <div class="lb-label">notes</div>
          <div id="lb-notes"></div>
        </div>
        <div id="lb-links-wrap">
          <div class="lb-label">links</div>
          <div id="lb-links"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="entries.js"></script>
  <script src="script.js"></script>
</body>

</html>
